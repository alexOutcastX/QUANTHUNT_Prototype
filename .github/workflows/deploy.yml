name: Deploy to VM

# LIVE-BACKEND hosting model (mirrors TaurEye's push-to-deploy, adapted for a
# resident service). Only the `production` branch is live: a push to production
# rsyncs the app to /opt/quanthunt on the VM, installs any new deps, and restarts
# the gunicorn service that nginx proxies to.
#
# Flow: work on feature branches -> PR into `main` (CI runs) -> merge. To go
# live, promote `main` into `production` (fast-forward or PR), which triggers
# this deploy. `main` itself does NOT deploy.
#
# Requires these repo secrets (Settings -> Secrets and variables -> Actions):
#   VM_HOST     the VM's host/IP
#   VM_USER     the deploy user (opc / ubuntu) — needs passwordless sudo (Oracle
#               default users have it) for systemctl restart/reload
#   VM_SSH_KEY  the PRIVATE deploy key whose public half is in the VM's
#               ~/.ssh/authorized_keys

on:
  push:
    branches: [production]   # every promotion to production deploys (deterministic go-live)
  workflow_dispatch:
    inputs:
      ref:
        description: "Ref to deploy (tag/sha/branch), e.g. v1.0.0 to roll back. Blank = latest."
        required: false
        default: ""

concurrency:
  group: deploy-vm
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          # On a normal push this is the pushed commit; on manual dispatch you can
          # supply any tag/sha (e.g. a previous release) to redeploy = rollback.
          ref: ${{ github.event.inputs.ref || github.sha }}

      - name: Configure SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VM_SSH_KEY }}" > ~/.ssh/id_deploy
          chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "${{ secrets.VM_HOST }}" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Snapshot current release (for instant rollback)
        env:
          U: ${{ secrets.VM_USER }}
          H: ${{ secrets.VM_HOST }}
        run: |
          # Copy the live code (not venv/.env/cache) to /opt/quanthunt.prev so
          # deploy/rollback.sh can restore the previous version instantly.
          ssh -i ~/.ssh/id_deploy "$U@$H" '
            APP=/opt/quanthunt
            if [ -d "$APP" ]; then
              rsync -a --delete --exclude venv --exclude .env \
                --exclude fund_cache.json --exclude __pycache__ \
                "$APP"/ "$APP".prev/ 2>/dev/null || true
            fi'

      - name: Rsync app + restart service
        env:
          U: ${{ secrets.VM_USER }}
          H: ${{ secrets.VM_HOST }}
          APP: /opt/quanthunt
        run: |
          ssh -i ~/.ssh/id_deploy "$U@$H" "mkdir -p $APP"
          # Ship the app, but never delete the server-side venv or local env file.
          rsync -az --delete \
            --exclude venv --exclude .git --exclude node_modules \
            --exclude '__pycache__' --exclude '.env' \
            --exclude 'fund_cache.json' --exclude 'index_cache.json' \
            --exclude 'graph_cache.json' \
            -e "ssh -i ~/.ssh/id_deploy" ./ "$U@$H:$APP/"
          # Install any new deps, then restart gunicorn and reload nginx.
          ssh -i ~/.ssh/id_deploy "$U@$H" "\
            $APP/venv/bin/pip install -q -r $APP/requirements.txt gunicorn && \
            sudo systemctl restart quanthunt && \
            (sudo restorecon -R $APP 2>/dev/null || true) && \
            sudo systemctl reload nginx"

      - name: Verify the app is up (post-deploy smoke test)
        env:
          U: ${{ secrets.VM_USER }}
          H: ${{ secrets.VM_HOST }}
        run: |
          # Give gunicorn a moment to rebind, then confirm nginx -> app answers.
          ssh -i ~/.ssh/id_deploy "$U@$H" '
            for i in $(seq 1 10); do
              if curl -fsS http://127.0.0.1/ping >/dev/null; then
                echo "OK: /ping responded on attempt $i"
                # Confirm the web UI shell is being served (RN-web build present)
                if curl -fsS http://127.0.0.1/ | grep -q "id=\"root\""; then
                  echo "OK: RN-web shell served at /"; exit 0
                fi
                echo "FAIL: / did not serve the web shell (is mobile/dist present?)"; exit 1
              fi
              sleep 2
            done
            echo "FAIL: app did not respond after restart"; exit 1'
