name: CI

# Runs on every pull request into main (and can be run manually). Kept fast and
# dependency-free so it's a quick required status check before merging.
on:
  pull_request:
    branches: [main]
  workflow_dispatch: {}

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Python syntax (compile, no imports/network)
        run: python -m py_compile server.py fundamentals.py wsgi.py auth.py broker.py news.py ai_graph.py holidays.py scanner.py relations.py store.py

      - name: Stdlib-only unit tests (auth, holidays, store)
        run: python -m unittest discover -s tests -p 'test_*.py' -v

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: JS engine unit tests (backtest, screener)
        working-directory: mobile
        run: |
          mkdir -p tests/build
          npx --yes esbuild src/backtest.ts --bundle --format=cjs --platform=node --outfile=tests/build/backtest.js --log-level=error
          npx --yes esbuild src/screener.ts --bundle --format=cjs --platform=node --outfile=tests/build/screener.js --log-level=error
          npx --yes esbuild src/costs.ts --bundle --format=cjs --platform=node --outfile=tests/build/costs.js --log-level=error
          node tests/engines.test.js

      - name: HTML / inline-JS sanity
        run: |
          python - <<'PY'
          html = open('StockScreenPro.html', encoding='utf-8').read()
          o, c = html.count('<script'), html.count('</script>')
          assert o == c, f'unbalanced <script> tags: {o} open / {c} close'
          assert '<title>' in html, 'missing <title>'
          for fn in ('runInstitutional', 'getScreenedData', 'runBacktest', 'loadTVChart'):
              assert fn in html, f'expected function {fn} missing from UI'
          print(f'HTML OK — {o} script blocks balanced, key functions present')
          PY

      - name: VERSION present and well-formed
        run: |
          v=$(cat VERSION)
          echo "VERSION=$v"
          echo "$v" | grep -Eq '^[0-9]+\.[0-9]+\.[0-9]+$' || { echo "VERSION must be semver X.Y.Z"; exit 1; }

      - name: Shell scripts parse
        run: bash -n deploy/setup-vm.sh && bash -n deploy/rollback.sh

  security:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      # Non-blocking dependency vulnerability report (informational).
      - name: pip-audit (Python deps)
        run: |
          pip install -q pip-audit
          pip-audit -r requirements.txt || echo "pip-audit found advisories (non-blocking)"
      - name: npm audit (JS deps)
        working-directory: mobile
        run: npm audit --audit-level=high || echo "npm audit found advisories (non-blocking)"
