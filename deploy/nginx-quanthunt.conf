# QuantHunt web server (reverse-proxy to the live gunicorn app).
# Install to /etc/nginx/conf.d/quanthunt.conf, then:
#   sudo nginx -t && sudo systemctl reload nginx
#
# Unlike TaurEye's static site, QuantHunt runs a resident Python service
# (gunicorn) that fetches market data on demand. nginx terminates :80 (add TLS
# later) and proxies every request to that service on 127.0.0.1:5000.
server {
    listen 80 default_server;
    server_name _;

    # Market-data calls to NSE / yfinance / TradingView can be slow; allow long
    # upstream waits (matches the gunicorn --timeout 120 in quanthunt.service).
    proxy_connect_timeout 10s;
    proxy_read_timeout    120s;
    proxy_send_timeout    120s;

    client_max_body_size 2m;

    gzip on;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_vary on;

    location / {
        proxy_pass http://127.0.0.1:5000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
